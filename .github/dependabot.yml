version: 2
updates:
  # Rust crate dependencies across the workspace.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: daily
      time: "18:00"
      timezone: "America/Vancouver"
    open-pull-requests-limit: 10
    groups:
      all-cargo:
        patterns:
          - "*"

  # Keeps the SHA-pinned GitHub Actions current (bumps both the pin and the
  # trailing # vX.Y.Z version comment).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
      time: "18:00"
      timezone: "America/Vancouver"
    open-pull-requests-limit: 5
    groups:
      all-actions:
        patterns:
          - "*"
